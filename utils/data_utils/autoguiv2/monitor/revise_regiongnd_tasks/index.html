<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FuncRegionGnd Task Revising UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="cvReady = true;"></script>
    <style>
      :root { --bg: #0b0f19; --panel: #121826; --text: #e2e8f0; --muted: #94a3b8; --accent: #60a5fa; --border: #1f2937; --highlight: #f59e0b;
              --success: #22c55e; --warning: #eab308; --error: #ef4444; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji"; background: var(--bg); color: var(--text); }
      header { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(11,15,25,0.9); backdrop-filter: blur(8px); z-index: 10; }
      h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: .2px; }
      .container { max-width: 1400px; margin: 16px auto; padding: 0 20px; }
      .row { display: grid; grid-template-columns: 1fr; gap: 14px; }
      .selector { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: center; }
      select, input, textarea { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; width: 100%; }
      button { background: var(--accent); color: var(--bg); border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; }
      button.secondary { background: #0b1220; color: var(--text); border: 1px solid var(--border); }
      .navigation { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
               background: rgba(96,165,250,0.15); color: var(--accent); }
      .status-tag { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 999px; font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; margin-left: 8px; }
      .status-untouched { background: rgba(148,163,184,0.15); color: var(--muted); border: 1px solid rgba(148,163,184,0.3); }
      .status-modified { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
      .status-abandoned { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
      .image-container { position: relative; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: #0f1625; }
      #screenshot { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 10px; }
      #bbox-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
      .fields { display: grid; gap: 12px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .12em; }
      .bbox-row { display: flex; gap: 10px; align-items: center; }
      #status { margin-left: auto; color: var(--muted); font-size: 12px; }
      .bbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .bbox-grid .bbox-row { display: grid; grid-template-columns: 1fr; gap: 6px; }
      .bbox-grid input { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .muted-line { color: var(--muted); font-size: 12px; }
      .options-display { display: grid; gap: 8px; margin-top: 8px; }
      .option-item { background: rgba(96,165,250,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 12px; }
      .option-item.correct { border-color: var(--success); background: rgba(34,197,94,0.08); }
      .option-label { font-weight: 600; color: var(--accent); margin-right: 8px; }
      .option-label.correct { color: var(--success); }
      .option-region-type { display: inline-block; padding: 2px 6px; background: rgba(148,163,184,0.15); border-radius: 4px; font-size: 10px; margin-left: 8px; color: var(--muted); }

      /* Modal styles */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal-content {
        background: var(--panel);
        border-radius: 12px;
        padding: 20px;
        max-width: 90%;
        max-height: 90vh;
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .close {
        position: absolute;
        top: 10px;
        right: 10px;
        cursor: pointer;
        font-size: 24px;
        color: var(--text);
      }
      .modal-grid {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
        margin-top: 15px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
      }
      .modal-controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        min-height: 0;
      }
      #correction-image-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 0;
        overflow: hidden;
      }
      #correction-image {
        max-width: 100%;
        max-height: 100%;
      }
      #correction-overlay {
        position: absolute;
        cursor: crosshair;
      }
      #zoom-preview-container h4 {
        margin: 10px 0 5px;
        font-size: 13px;
        letter-spacing: .1em;
        color: var(--muted);
        text-transform: uppercase;
      }
      #zoom-preview {
        width: 200px;
        height: 200px;
        border: 1px solid var(--border);
        background-color: var(--bg);
        position: relative;
        overflow: hidden;
      }
      #zoom-canvas {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
      #zoom-preview::before, #zoom-preview::after {
        content: '';
        position: absolute;
        background: rgba(255, 0, 0, 0.7);
        z-index: 1;
      }
      #zoom-preview::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
      #zoom-preview::after { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }
      .coord-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
      .coord-input label { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); }
      .coord-input input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; width: 100%; }
      .action-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); flex-shrink: 0; }
      .action-buttons button.primary { background: var(--accent); color: white; }
      .action-buttons button.secondary { background: var(--border); color: var(--text); }
      #loading-indicator {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.7);
        padding: 10px 20px;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        z-index: 10;
      }
      .answer-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .answer-btn { padding: 8px; border: 2px solid var(--border); background: var(--panel); color: var(--text); border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
      .answer-btn:hover { border-color: var(--accent); }
      .answer-btn.selected { border-color: var(--success); background: rgba(34,197,94,0.15); color: var(--success); }
    </style>
  </head>
  <body>
    <header>
      <h1>FuncRegionGnd 任务修订</h1>
      <span id="status"></span>
    </header>
    <div class="container">
      <div class="row">
        <div class="selector">
          <label>Dataset</label>
          <select id="dataset-select"></select>
        </div>
        <div class="selector">
          <label>Sample</label>
          <select id="sample-select"></select>
        </div>

        <div class="navigation">
          <button id="prev-btn">Previous</button>
          <span class="badge" id="progress"></span>
          <button id="next-btn">Next</button>
          <button class="secondary" id="fix-bbox">Fix BBox</button>
          <label style="display: flex; align-items: center; gap: 8px; margin-left: 16px;">
            <input type="checkbox" id="abandoned-toggle" />
            <span style="font-size: 12px; color: var(--muted);">Abandoned</span>
          </label>
        </div>
        <div class="muted-line" id="corrections-file"></div>

        <div class="image-container" id="full-image-container">
          <img id="screenshot" src="" alt="Screenshot" />
          <svg id="bbox-overlay"></svg>
        </div>

        <div class="fields">
          <div class="field">
            <label>Question Text</label>
            <textarea id="question-text" rows="3"></textarea>
          </div>

          <div class="field">
            <label>Correct Answer</label>
            <div class="answer-selector">
              <button class="answer-btn" data-answer="A">A</button>
              <button class="answer-btn" data-answer="B">B</button>
              <button class="answer-btn" data-answer="C">C</button>
              <button class="answer-btn" data-answer="D">D</button>
            </div>
          </div>

          <div class="field">
            <label>Options (Read-only)</label>
            <div id="options-display" class="options-display"></div>
          </div>

          <div class="field">
            <label>Bounding Box (for Correct Answer)</label>
            <div class="bbox-grid">
              <div class="bbox-row">
                <label style="color: var(--muted); font-size: 11px;">Modified Box (normalized 0-1000)</label>
                <input id="modified-bbox" type="text" />
              </div>
              <div class="bbox-row">
                <label style="color: var(--muted); font-size: 11px;">Modified Box (unnormalized)</label>
                <input id="modified-bbox-px" type="text" readonly />
              </div>
              <div class="bbox-row">
                <label style="color: var(--muted); font-size: 11px;">Original Box (normalized 0-1000)</label>
                <input id="original-bbox" type="text" readonly />
              </div>
              <div class="bbox-row">
                <label style="color: var(--muted); font-size: 11px;">Original Box (unnormalized)</label>
                <input id="original-bbox-px" type="text" readonly />
              </div>
            </div>
            <div style="margin-top: 10px; display:flex; gap:10px;">
              <button class="secondary" id="apply-bbox">Apply Modified Box</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Correction Modal -->
    <div id="correction-modal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Correct Bounding Box</h3>
        <p style="color: var(--muted); margin-top: 0;">Click "Select Top-Left", then click on the image. Then "Select Bottom-Right". Long-press for auto-snap to borders. Hold Ctrl + long-press for auto-snap to corners.</p>

        <div class="modal-grid">
          <div class="modal-controls">
            <button id="btn-select-tl" onclick="startSelect('tl')">Select Top-Left</button>
            <button id="btn-select-br" onclick="startSelect('br')">Select Bottom-Right</button>
            <div class="coord-input">
              <label>TL X: <input id="input-tl-x" type="number" oninput="updateFromInputs()"></label>
              <label>TL Y: <input id="input-tl-y" type="number" oninput="updateFromInputs()"></label>
              <label>BR X: <input id="input-br-x" type="number" oninput="updateFromInputs()"></label>
              <label>BR Y: <input id="input-br-y" type="number" oninput="updateFromInputs()"></label>
            </div>
            <div id="cursor-coords-display" style="font-size: 12px; color: var(--muted); height: 1.5em;"></div>
            <div id="zoom-preview-container">
              <h4>Zoom Preview</h4>
              <div id="zoom-preview"><canvas id="zoom-canvas"></canvas></div>
            </div>
          </div>
          <div id="correction-image-container">
            <img id="correction-image" src="" />
            <svg id="correction-overlay"></svg>
            <div id="loading-indicator">Detecting...</div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="secondary" onclick="closeModal()">Cancel</button>
          <button class="primary" onclick="confirmCorrection()">Confirm</button>
        </div>
      </div>
    </div>
    <canvas id="temp-canvas" style="display:none;"></canvas>

    <script>
      // ---- App state ----
      const $ = (id) => document.getElementById(id);
      const datasetSel = $('dataset-select');
      const sampleSel = $('sample-select');
      const statusEl = $('status');
      const progressEl = $('progress');
      const screenshotImg = $('screenshot');
      const overlaySvg = d3.select('#bbox-overlay');
      const correctionsFileEl = $('corrections-file');

      let cvReady = false;
      let currentDataset = '';
      let samples = [];
      let currentIndex = 0;
      let currentSample = null;
      let currentOptions = [];
      let selectedAnswer = '';
      let originalBboxNorm = null;
      let modifiedBboxNorm = null;
      let originalW = 0, originalH = 0;

      // For correction modal
      let selectMode = null;
      let tlPoint = {x: 0, y: 0}, brPoint = {x: 0, y: 0};
      let currentRect = null;
      let currentOrigRect = null;
      let handleMouseLeaveForCorrection;
      let pressTimer = null;
      let isLongPress = false;
      let startX = 0, startY = 0;
      let isCtrlPressed = false;

      function setStatus(msg) { statusEl.textContent = msg || ''; }

      async function getJSON(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error(await r.text());
        return r.json();
      }

      function normToPixel(b, W, H) {
        if (!b || b.length !== 4) return [0,0,0,0];
        return [
          Math.round(b[0] * W / 1000),
          Math.round(b[1] * H / 1000),
          Math.round(b[2] * W / 1000),
          Math.round(b[3] * H / 1000),
        ];
      }
      function pixelToNorm(b, W, H) {
        if (!b || b.length !== 4) return [0,0,0,0];
        return [
          Math.round(b[0] * 1000 / W),
          Math.round(b[1] * 1000 / H),
          Math.round(b[2] * 1000 / W),
          Math.round(b[3] * 1000 / H),
        ];
      }

      async function loadDatasets() {
        const data = await getJSON('/api/datasets');
        datasetSel.innerHTML = '';
        (data.datasets || []).forEach(ds => {
          const opt = document.createElement('option');
          opt.value = ds; opt.textContent = ds;
          datasetSel.appendChild(opt);
        });
        if (datasetSel.options.length) {
          currentDataset = datasetSel.value = datasetSel.options[0].value;
          await loadSamples();
        } else {
          setStatus('No datasets found (need */FuncRegion/grounding_mode/*_result.json)');
        }
      }

      async function loadSamples() {
        if (!currentDataset) return;
        const data = await getJSON(`/api/images?dataset=${encodeURIComponent(currentDataset)}`);
        samples = data.images || [];
        sampleSel.innerHTML = '';
        samples.forEach((s, idx) => {
          const opt = document.createElement('option');
          opt.value = idx;
          const baseLabel = s.label || `${s.json_file} q${s.q_idx}`;
          const statusEmoji = s.status === 'untouched' ? '🆕' : s.status === 'modified' ? '✏️' : '🗑️';
          opt.textContent = `${statusEmoji} ${baseLabel}`;
          opt.setAttribute('data-status', s.status);
          sampleSel.appendChild(opt);
        });
        if (samples.length) {
          currentIndex = 0;
          sampleSel.value = '0';
          await loadSampleByIndex(0);
        }
      }

      function updateProgress() {
        progressEl.textContent = samples.length ? `${currentIndex + 1} / ${samples.length}` : '0 / 0';
      }

      async function loadSampleByIndex(idx) {
        if (!samples.length) return;
        const s = samples[idx];
        const data = await getJSON(`/api/sample?dataset=${encodeURIComponent(currentDataset)}&json_file=${encodeURIComponent(s.json_file)}&q_idx=${s.q_idx}`);
        currentSample = { ...data, ...s };
        currentOptions = data.options || [];

        // Set question text
        $('question-text').value = data.modified_question || data.original_question || '';

        // Set correct answer
        selectedAnswer = data.modified_correct_answer || data.original_correct_answer || '';
        updateAnswerButtons();

        // Display options
        renderOptions();

        // Set bboxes
        originalBboxNorm = Array.isArray(data.original_bbox) ? data.original_bbox : [0,0,0,0];
        modifiedBboxNorm = Array.isArray(data.modified_bbox) ? data.modified_bbox : originalBboxNorm;
        $('modified-bbox').value = JSON.stringify(modifiedBboxNorm);
        $('original-bbox').value = JSON.stringify(originalBboxNorm);

        // Set abandoned toggle
        $('abandoned-toggle').checked = data.abandoned || false;

        // Set image
        if (data.image_base64) {
          screenshotImg.src = `data:image/jpeg;base64,${data.image_base64}`;
        } else {
          screenshotImg.src = '';
        }

        // Set original size
        const size = data.image_size || [];
        originalW = size[0] || 0;
        originalH = size[1] || 0;

        // Update pixel boxes
        if (originalW && originalH) {
          $('original-bbox-px').value = JSON.stringify(normToPixel(originalBboxNorm, originalW, originalH));
          $('modified-bbox-px').value = JSON.stringify(normToPixel(modifiedBboxNorm, originalW, originalH));
        } else {
          $('original-bbox-px').value = '';
          $('modified-bbox-px').value = '';
        }

        // Show corrections file
        if (data.corrections_file) {
          correctionsFileEl.textContent = `Corrections file: ${data.corrections_file}`;
        } else {
          correctionsFileEl.textContent = '';
        }

        screenshotImg.onload = () => {
          renderFullOverlay();
        };
        updateProgress();
        setStatus(`Loaded ${s.json_file} q${s.q_idx}`);
      }

      function updateAnswerButtons() {
        document.querySelectorAll('.answer-btn').forEach(btn => {
          if (btn.dataset.answer === selectedAnswer) {
            btn.classList.add('selected');
          } else {
            btn.classList.remove('selected');
          }
        });
      }

      function renderOptions() {
        const container = $('options-display');
        container.innerHTML = '';
        currentOptions.forEach(opt => {
          const div = document.createElement('div');
          div.className = 'option-item';
          if (opt.label === selectedAnswer) {
            div.classList.add('correct');
          }
          const labelSpan = document.createElement('span');
          labelSpan.className = 'option-label';
          if (opt.label === selectedAnswer) {
            labelSpan.classList.add('correct');
          }
          labelSpan.textContent = opt.label;
          
          const typeSpan = document.createElement('span');
          typeSpan.className = 'option-region-type';
          typeSpan.textContent = opt.region_type || 'Unknown';
          
          const descText = document.createTextNode(': ' + (opt.description || '(no description)').substring(0, 150));
          
          div.appendChild(labelSpan);
          div.appendChild(typeSpan);
          div.appendChild(descText);
          container.appendChild(div);
        });
      }

      function renderFullOverlay() {
        overlaySvg.selectAll('*').remove();
        const container = $('full-image-container');
        const img = screenshotImg;
        if (!img.src) return;

        const imgRect = img.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        const left = imgRect.left - containerRect.left;
        const top = imgRect.top - containerRect.top;

        overlaySvg
          .attr('width', container.clientWidth)
          .attr('height', container.clientHeight);

        const g = overlaySvg.append('g').attr('transform', `translate(${left}, ${top})`);

        const drawNormRect = (bboxNorm, stroke, fill, dash=null) => {
          if (!bboxNorm || bboxNorm.length !== 4) return;
          const x1 = bboxNorm[0] / 1000 * imgRect.width;
          const y1 = bboxNorm[1] / 1000 * imgRect.height;
          const x2 = bboxNorm[2] / 1000 * imgRect.width;
          const y2 = bboxNorm[3] / 1000 * imgRect.height;
          const r = g.append('rect')
            .attr('x', x1).attr('y', y1).attr('width', Math.max(0, x2-x1)).attr('height', Math.max(0, y2-y1))
            .attr('fill', fill).attr('stroke', stroke).attr('stroke-width', 2);
          if (dash) r.attr('stroke-dasharray', dash);
        };

        // Draw all option bboxes (light gray)
        currentOptions.forEach(opt => {
          if (opt.bbox && opt.bbox.length === 4 && originalW && originalH) {
            const bboxNorm = pixelToNorm(opt.bbox, originalW, originalH);
            if (opt.label === selectedAnswer) {
              // Highlight correct answer in green
              drawNormRect(bboxNorm, 'rgba(34,197,94,1)', 'rgba(34,197,94,0.08)', null);
            } else {
              // Other options in light gray
              drawNormRect(bboxNorm, 'rgba(148,163,184,0.5)', 'rgba(148,163,184,0.03)', '5 4');
            }
          }
        });

        // Draw modified bbox (orange, if different from original)
        if (JSON.stringify(modifiedBboxNorm) !== JSON.stringify(originalBboxNorm)) {
          drawNormRect(modifiedBboxNorm, 'rgba(245,158,11,1)', 'rgba(245,158,11,0.08)', null);
        }
      }

      async function saveCurrentChanges() {
        if (!currentSample) return;
        
        let bbox = null;
        try {
          bbox = JSON.parse($('modified-bbox').value);
        } catch (e) {
          setStatus('Invalid bbox JSON, not saved');
          return;
        }
        
        await fetch('/api/save_correction', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            dataset: currentDataset,
            json_file: currentSample.json_file,
            q_idx: currentSample.q_idx,
            modified_question: $('question-text').value,
            modified_correct_answer: selectedAnswer,
            modified_bbox: bbox,
            abandoned: $('abandoned-toggle').checked
          })
        });
        setStatus('Saved');
      }

      // UI events
      datasetSel.onchange = async () => { await saveCurrentChanges(); currentDataset = datasetSel.value; await loadSamples(); };
      sampleSel.onchange = async () => { await saveCurrentChanges(); currentIndex = parseInt(sampleSel.value, 10); await loadSampleByIndex(currentIndex); };

      $('prev-btn').onclick = async () => { if (currentIndex <= 0) return; await saveCurrentChanges(); currentIndex -= 1; sampleSel.value = String(currentIndex); await loadSampleByIndex(currentIndex); };
      $('next-btn').onclick = async () => { if (currentIndex >= samples.length - 1) return; await saveCurrentChanges(); currentIndex += 1; sampleSel.value = String(currentIndex); await loadSampleByIndex(currentIndex); };
      
      $('apply-bbox').onclick = () => {
        try {
          modifiedBboxNorm = JSON.parse($('modified-bbox').value);
          if (originalW && originalH) {
            $('modified-bbox-px').value = JSON.stringify(normToPixel(modifiedBboxNorm, originalW, originalH));
          }
          renderFullOverlay();
        } catch (e) {}
      };

      $('fix-bbox').onclick = async () => {
        if (!currentSample || !currentSample.image_base64) return;
        if (typeof cv === 'undefined' || !cvReady) {
          alert('OpenCV is not loaded yet. Please wait or refresh the page.');
          return;
        }
        openCorrectionModal();
      };

      // Answer button clicks
      document.querySelectorAll('.answer-btn').forEach(btn => {
        btn.onclick = () => {
          selectedAnswer = btn.dataset.answer;
          updateAnswerButtons();
          renderOptions();
          
          // Update bbox to match selected answer's option
          const opt = currentOptions.find(o => o.label === selectedAnswer);
          if (opt && opt.bbox && opt.bbox.length === 4 && originalW && originalH) {
            modifiedBboxNorm = pixelToNorm(opt.bbox, originalW, originalH);
            $('modified-bbox').value = JSON.stringify(modifiedBboxNorm);
            $('modified-bbox-px').value = JSON.stringify(opt.bbox);
            renderFullOverlay();
          }
        };
      });

      // Modal logic (same as element-level UI)
      async function openCorrectionModal() {
        const img = $('correction-image');
        $('correction-modal').style.display = 'flex';
        img.src = screenshotImg.src;

        if (!originalW || !originalH) {
          originalW = screenshotImg.naturalWidth || 0;
          originalH = screenshotImg.naturalHeight || 0;
        }

        const bboxNorm = modifiedBboxNorm || originalBboxNorm;
        const bbPix = normToPixel(bboxNorm, originalW, originalH);
        tlPoint = { x: bbPix[0], y: bbPix[1] };
        brPoint = { x: bbPix[2], y: bbPix[3] };

        $('input-tl-x').value = tlPoint.x; $('input-tl-y').value = tlPoint.y;
        $('input-br-x').value = brPoint.x; $('input-br-y').value = brPoint.y;

        img.onload = () => {
          requestAnimationFrame(() => {
            const imgContainer = $('correction-image-container');
            const overlaySvgEl = d3.select($('correction-overlay'));
            const imgRect = img.getBoundingClientRect();
            const containerRect = imgContainer.getBoundingClientRect();
            const offsetLeft = imgRect.left - containerRect.left;
            const offsetTop = imgRect.top - containerRect.top;
            $('correction-overlay').style.left = `${offsetLeft}px`;
            $('correction-overlay').style.top = `${offsetTop}px`;
            overlaySvgEl.selectAll('*').remove();
            overlaySvgEl.attr('width', imgRect.width).attr('height', imgRect.height);

            const origPix = normToPixel(originalBboxNorm, originalW, originalH);
            const scaleX = imgRect.width / originalW;
            const scaleY = imgRect.height / originalH;

            currentOrigRect = overlaySvgEl.append('rect')
              .attr('fill', 'none')
              .attr('stroke', 'rgba(148,163,184,0.9)')
              .attr('stroke-width', 2)
              .attr('stroke-dasharray', '4 4')
              .attr('x', origPix[0]*scaleX)
              .attr('y', origPix[1]*scaleY)
              .attr('width', Math.max(0, (origPix[2]-origPix[0])*scaleX))
              .attr('height', Math.max(0, (origPix[3]-origPix[1])*scaleY));

            currentRect = overlaySvgEl.append('rect')
              .attr('fill', 'rgba(255, 0, 0, 0.25)')
              .attr('stroke', 'red')
              .attr('stroke-width', 2);

            updateRect(imgRect.width, imgRect.height);

            const overlayDom = $('correction-overlay');
            overlayDom.addEventListener('mousemove', handleMouseMove);
            handleMouseLeaveForCorrection = () => {
              $('zoom-canvas').getContext('2d').clearRect(0, 0, $('zoom-canvas').width, $('zoom-canvas').height);
              $('cursor-coords-display').textContent = '';
            };
            overlayDom.addEventListener('mouseleave', handleMouseLeaveForCorrection);
            overlayDom.addEventListener('mousedown', handleMouseDown);
            overlayDom.addEventListener('mouseup', handleMouseUp);
          });
        };
      }

      function closeModal() {
        $('correction-modal').style.display = 'none';
        const overlayDom = $('correction-overlay');
        overlayDom.removeEventListener('mousemove', handleMouseMove);
        if (handleMouseLeaveForCorrection) overlayDom.removeEventListener('mouseleave', handleMouseLeaveForCorrection);
        overlayDom.removeEventListener('mousedown', handleMouseDown);
        overlayDom.removeEventListener('mouseup', handleMouseUp);
        selectMode = null;
      }

      function startSelect(mode) {
        selectMode = mode;
        $('btn-select-tl').style.borderColor = (mode === 'tl') ? 'var(--accent)' : 'var(--border)';
        $('btn-select-br').style.borderColor = (mode === 'br') ? 'var(--accent)' : 'var(--border)';
      }

      function updateFromInputs() {
        tlPoint.x = parseInt($('input-tl-x').value) || 0;
        tlPoint.y = parseInt($('input-tl-y').value) || 0;
        brPoint.x = parseInt($('input-br-x').value) || 0;
        brPoint.y = parseInt($('input-br-y').value) || 0;
        const img = $('correction-image');
        if (img.complete) updateRect(img.clientWidth, img.clientHeight);
      }

      function updateRect(displayedW, displayedH) {
        const x1 = (tlPoint.x / originalW) * displayedW, y1 = (tlPoint.y / originalH) * displayedH;
        const x2 = (brPoint.x / originalW) * displayedW, y2 = (brPoint.y / originalH) * displayedH;
        const x = Math.min(x1, x2), y = Math.min(y1, y2);
        const w = Math.abs(x2 - x1), h = Math.abs(y2 - y1);
        currentRect.attr('x', x).attr('y', y).attr('width', w).attr('height', h);
      }

      function handleMouseDown(e) {
        if (!selectMode) return;
        const overlayRect = e.currentTarget.getBoundingClientRect();
        startX = e.clientX - overlayRect.left;
        startY = e.clientY - overlayRect.top;
        isCtrlPressed = e.ctrlKey;
        isLongPress = false;
        pressTimer = setTimeout(() => {
          isLongPress = true;
          $('loading-indicator').style.display = 'block';
          if (isCtrlPressed) snapToCorner(startX, startY, overlayRect.width, overlayRect.height);
          else snapToLine(startX, startY, overlayRect.width, overlayRect.height);
        }, 500);
      }

      function handleMouseUp(e) {
        clearTimeout(pressTimer);
        if (isLongPress) { isLongPress = false; return; }
        if (selectMode) {
          const overlayRect = e.currentTarget.getBoundingClientRect();
          const endX = e.clientX - overlayRect.left;
          const endY = e.clientY - overlayRect.top;
          const dist = Math.hypot(endX - startX, endY - startY);
          if (dist < 5) handleImageClick(e);
        }
      }

      function handleImageClick(e) {
        if (!selectMode) return;
        const overlayRect = e.currentTarget.getBoundingClientRect();
        const x_norm = (e.clientX - overlayRect.left) / overlayRect.width;
        const y_norm = (e.clientY - overlayRect.top) / overlayRect.height;
        const pixelX = Math.round(x_norm * originalW);
        const pixelY = Math.round(y_norm * originalH);

        if (selectMode === 'tl') {
          tlPoint.x = pixelX; tlPoint.y = pixelY;
          $('input-tl-x').value = pixelX; $('input-tl-y').value = pixelY;
          startSelect('br');
        } else if (selectMode === 'br') {
          brPoint.x = pixelX; brPoint.y = pixelY;
          $('input-br-x').value = pixelX; $('input-br-y').value = pixelY;
          selectMode = null;
          $('btn-select-br').style.borderColor = 'var(--border)';
        }
        updateRect(overlayRect.width, overlayRect.height);
      }

      function handleMouseMove(e) {
        if (pressTimer) clearTimeout(pressTimer);
        const img = $('correction-image');
        if (!img.complete || !cvReady) return;

        const overlayRect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - overlayRect.left;
        const y = e.clientY - overlayRect.top;

        const pixelX = Math.round((x / overlayRect.width) * originalW);
        const pixelY = Math.round((y / overlayRect.height) * originalH);
        $('cursor-coords-display').textContent = `Cursor: (${pixelX}, ${pixelY})`;

        const zoomCanvas = $('zoom-canvas');
        const zoomFactor = 3;
        const previewSize = 200;
        const cropSize = previewSize / zoomFactor;

        zoomCanvas.width = cropSize;
        zoomCanvas.height = cropSize;

        const sourceCropX = pixelX - (cropSize / 2);
        const sourceCropY = pixelY - (cropSize / 2);

        const tempCanvas = $('temp-canvas');
        tempCanvas.width = cropSize;
        tempCanvas.height = cropSize;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(img, sourceCropX, sourceCropY, cropSize, cropSize, 0, 0, cropSize, cropSize);

        try {
          const imageData = tempCtx.getImageData(0, 0, cropSize, cropSize);
          let src = cv.matFromImageData(imageData);
          let dst = new cv.Mat();
          let M = cv.matFromArray(3, 3, cv.CV_32FC1, [0, -1, 0, -1, 5, -1, 0, -1, 0]);
          let anchor = new cv.Point(-1, -1);
          cv.filter2D(src, dst, cv.CV_8U, M, anchor, 0, cv.BORDER_DEFAULT);
          cv.imshow(zoomCanvas, dst);
          src.delete(); dst.delete(); M.delete();
        } catch(err) {
          const zCtx = zoomCanvas.getContext('2d');
          zCtx.drawImage(tempCanvas, 0, 0);
        }
      }

      function snapToLine(x, y, displayedW, displayedH) {
        const img = $('correction-image');
        const canvas = $('temp-canvas');
        canvas.width = img.clientWidth;
        canvas.height = img.clientHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const windowSize = 200;
        const half = windowSize / 2;
        let left = Math.max(0, x - half);
        let top = Math.max(0, y - half);
        if (left + windowSize > displayedW) left = displayedW - windowSize;
        if (top + windowSize > displayedH) top = displayedH - windowSize;

        const imageData = ctx.getImageData(left, top, windowSize, windowSize);
        let src = cv.matFromImageData(imageData);
        let gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
        let edges = new cv.Mat();
        cv.Canny(gray, edges, 50, 150, 3, false);
        let lines = new cv.Mat();
        cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 20, 30, 10);

        const localX = x - left;
        const localY = y - top;
        let closestDist = Infinity;
        let snappedLocalX = localX;
        let snappedLocalY = localY;

        for (let i = 0; i < lines.rows; ++i) {
          const x1 = lines.data32S[i * 4];
          const y1 = lines.data32S[i * 4 + 1];
          const x2 = lines.data32S[i * 4 + 2];
          const y2 = lines.data32S[i * 4 + 3];
          const pt = closestPointOnLineSegment(localX, localY, x1, y1, x2, y2);
          const dist = distance(localX, localY, pt.x, pt.y);
          if (dist < closestDist) {
            closestDist = dist;
            snappedLocalX = pt.x;
            snappedLocalY = pt.y;
          }
        }

        let snappedX = x;
        let snappedY = y;
        if (closestDist < 10 && lines.rows > 0) {
          snappedX = left + snappedLocalX;
          snappedY = top + snappedLocalY;
        }

        src.delete(); gray.delete(); edges.delete(); lines.delete();
        $('loading-indicator').style.display = 'none';

        const x_norm = snappedX / displayedW;
        const y_norm = snappedY / displayedH;
        const pixelX = Math.round(x_norm * originalW);
        const pixelY = Math.round(y_norm * originalH);

        if (selectMode === 'tl') {
          tlPoint.x = pixelX; tlPoint.y = pixelY;
          $('input-tl-x').value = pixelX; $('input-tl-y').value = pixelY;
          startSelect('br');
        } else if (selectMode === 'br') {
          brPoint.x = pixelX; brPoint.y = pixelY;
          $('input-br-x').value = pixelX; $('input-br-y').value = pixelY;
          selectMode = null;
          $('btn-select-br').style.borderColor = 'var(--border)';
        }
        updateRect(displayedW, displayedH);
      }

      function snapToCorner(x, y, displayedW, displayedH) {
        const img = $('correction-image');
        const canvas = $('temp-canvas');
        canvas.width = img.clientWidth;
        canvas.height = img.clientHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const windowSize = 200;
        const half = windowSize / 2;
        let left = Math.max(0, x - half);
        let top = Math.max(0, y - half);
        if (left + windowSize > displayedW) left = displayedW - windowSize;
        if (top + windowSize > displayedH) top = displayedH - windowSize;

        const imageData = ctx.getImageData(left, top, windowSize, windowSize);
        let src = cv.matFromImageData(imageData);
        let gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);

        let blurred = new cv.Mat();
        let ksize = new cv.Size(5, 5);
        cv.GaussianBlur(gray, blurred, ksize, 0, 0, cv.BORDER_DEFAULT);

        let corners = new cv.Mat();
        cv.goodFeaturesToTrack(blurred, corners, 20, 0.01, 5, new cv.Mat(), 3, true, 0.04);

        const localX = x - left;
        const localY = y - top;
        let closestDist = Infinity;
        let snappedLocalX = localX;
        let snappedLocalY = localY;

        for (let i = 0; i < corners.rows; ++i) {
          let cx = corners.data32F[i * 2];
          let cy = corners.data32F[i * 2 + 1];
          const dist = distance(localX, localY, cx, cy);
          if (dist < closestDist) {
            closestDist = dist;
            snappedLocalX = cx;
            snappedLocalY = cy;
          }
        }

        let snappedX = x;
        let snappedY = y;
        if (closestDist < 10 && corners.rows > 0) {
          snappedX = left + snappedLocalX;
          snappedY = top + snappedLocalY;
        }

        src.delete(); gray.delete(); blurred.delete(); corners.delete();
        $('loading-indicator').style.display = 'none';

        const x_norm = snappedX / displayedW;
        const y_norm = snappedY / displayedH;
        const pixelX = Math.round(x_norm * originalW);
        const pixelY = Math.round(y_norm * originalH);

        if (selectMode === 'tl') {
          tlPoint.x = pixelX; tlPoint.y = pixelY;
          $('input-tl-x').value = pixelX; $('input-tl-y').value = pixelY;
          startSelect('br');
        } else if (selectMode === 'br') {
          brPoint.x = pixelX; brPoint.y = pixelY;
          $('input-br-x').value = pixelX; $('input-br-y').value = pixelY;
          selectMode = null;
          $('btn-select-br').style.borderColor = 'var(--border)';
        }
        updateRect(displayedW, displayedH);
      }

      function closestPointOnLineSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        if (dx === 0 && dy === 0) return {x: x1, y: y1};
        const t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
        const clampedT = Math.max(0, Math.min(1, t));
        return {x: x1 + clampedT * dx, y: y1 + clampedT * dy};
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      async function confirmCorrection() {
        const final_tl_x = Math.min(parseInt($('input-tl-x').value), parseInt($('input-br-x').value));
        const final_tl_y = Math.min(parseInt($('input-tl-y').value), parseInt($('input-br-y').value));
        const final_br_x = Math.max(parseInt($('input-tl-x').value), parseInt($('input-br-x').value));
        const final_br_y = Math.max(parseInt($('input-tl-y').value), parseInt($('input-br-y').value));

        const new_bbox_pixel = [final_tl_x, final_tl_y, final_br_x, final_br_y];
        const new_bbox_norm = pixelToNorm(new_bbox_pixel, originalW, originalH);
        modifiedBboxNorm = new_bbox_norm;
        $('modified-bbox').value = JSON.stringify(modifiedBboxNorm);
        $('modified-bbox-px').value = JSON.stringify(new_bbox_pixel);
        renderFullOverlay();
        closeModal();
      }

      (async () => {
        await loadDatasets();
      })();
    </script>
  </body>
</html>
